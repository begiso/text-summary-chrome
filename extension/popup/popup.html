<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">S</div>
      <h1 class="title">Text Summary AI</h1>
    </div>

    <div class="divider"></div>

    <div class="api-section">
      <label class="label" for="api-key-input">Gemini API ключ</label>
      <div class="input-row">
        <input type="password" id="api-key-input" class="input" placeholder="AIzaSy...">
        <button id="toggle-visibility" class="icon-btn" title="Показать/скрыть">
          <span id="eye-icon">&#128065;</span>
        </button>
      </div>
      <button id="save-btn" class="save-btn">Сохранить</button>
      <div id="status-msg" class="status-msg"></div>
      <a class="api-link" href="https://aistudio.google.com/apikey" target="_blank">Получить бесплатный ключ →</a>
    </div>

    <div class="divider"></div>

    <div class="instructions">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Выделите любой текст на странице</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Нажмите правую кнопку мыши</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Выберите <strong>«Сделать саммари с AI»</strong></div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="footer">
      <span id="status-dot" class="status-dot"></span>
      <span id="status-text" class="status-text">Проверка...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
